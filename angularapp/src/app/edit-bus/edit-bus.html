<div class="edit-bus-container">
  <h2>Edit Bus</h2>

  <form (ngSubmit)="onSubmit()" #busForm="ngForm">

    <div class="form-group">
      <label>Bus Name</label>
      <input type="text" name="name" [(ngModel)]="busData.name" required
        placeholder="Enter bus name" />
      <span class="error" *ngIf="submitted && !busData.name">Bus name is required</span>
    </div>

    <div class="form-group">
      <label>Capacity</label>
      <input type="number" name="capacity" [(ngModel)]="busData.capacity" required
        placeholder="Enter capacity" />
      <span class="error" *ngIf="submitted && !busData.capacity">Capacity is required</span>
    </div>

    <div class="form-group">
      <label>Last Service Date</label>
      <input type="date" name="servicedate" [(ngModel)]="busData.servicedate" required />
      <span class="error" *ngIf="submitted && !busData.servicedate">Service date is required</span>
    </div>

    <div class="form-group">
      <label>Total Kilometer</label>
      <input type="number" name="kilometer" [(ngModel)]="busData.kilometer" required
        placeholder="Enter total kilometer" />
      <span class="error" *ngIf="submitted && !busData.kilometer">Kilometer is required</span>
    </div>

    <div class="form-group">
      <label>Bus Type</label>
      <select name="busType" [(ngModel)]="busData.busType" required>
        <option value="">Select Bus Type</option>
        <option value="AC">AC</option>
        <option value="Non-AC">Non-AC</option>
      </select>
      <span class="error" *ngIf="submitted && !busData.busType">Bus type is required</span>
    </div>

    <div class="button-group">
      <button type="submit" class="update-btn">Update Bus</button>
      <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
    </div>

  </form>

  <div class="success-message" *ngIf="successMessage">
    <p>✅ Bus updated successfully!</p>
    <button (click)="navigateToViewBus()">OK</button>
  </div>
</div>
